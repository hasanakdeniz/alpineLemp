services:
  mariadb:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    volumes:
      - mariadb:/var/lib/mysql

  alpine:
    build:
      context: .
      dockerfile: alpine.Dockerfile
      args:
        SFTP_USER: ${SFTP_USER}
        SFTP_PASSWORD: ${SFTP_PASSWORD}
    restart: always
    ports: 
      - 80
      - "${SFTP_PORT}:22"
    tty: true
    volumes:
      - alpine:/home/alpine/www
    labels:      
      # DÜZELTME: Host(...) kuralları eklendi ve port 80 Traefik'e bildirildi
      - "traefik.http.routers.alpine-lemp-${SFTP_USER}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.alpine-lemp-${SFTP_USER}.middlewares=https-redirect-${SFTP_USER}S"
      
      - "traefik.http.routers.alpine-lemp-${SFTP_USER}S.entrypoints=websecure"
      - "traefik.http.routers.alpine-lemp-${SFTP_USER}S.rule=Host(`${DOMAINS}`)"
      - "traefik.http.routers.alpine-lemp-${SFTP_USER}S.tls=true"
      - "traefik.http.routers.alpine-lemp-${SFTP_USER}S.tls.certresolver=le"
      
      - "traefik.http.services.alpine-lemp-${SFTP_USER}.loadbalancer.server.port=80"
      
      - "traefik.http.middlewares.https-redirect-${SFTP_USER}S.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect-${SFTP_USER}S.redirectscheme.permanent=true"

volumes:
  mariadb: {}
  alpine: {}
